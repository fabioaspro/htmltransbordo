
<po-toolbar p-title="1.00.000 - HTMLESRR033 - PARÂMETROS DE TRANSBORDO"
  p-actions-icon="bi bi-question-circle"
  [p-actions]="toolbarActions">
</po-toolbar>

  <app-dn-modal
                [visible]="mostrarModal"
                title="Excluir registro"
                [message]="mensagemModal"
                (confirm)="onConfirmarExclusao($event)">
  </app-dn-modal>


  <div class="cabec">
    <div class="tipoBusca">
        <po-button p-tooltip="Atualizar Tela" p-label="Atualizar"            (p-click)="ChamaObterDadosPag()" p-icon="bi bi-arrow-clockwise"    p-kind="primary" style="margin-left: 5px;"></po-button>
        <po-button p-label="Novo"                 (p-click)="onIncluir('Inclusão')"             p-icon="bi bi-bag-plus"           p-kind="primary" style="margin-left: 5px;" p-tooltip="Novo Transbordo"></po-button>
        <po-button p-label="Excluir"              (p-click)="onExcluirSelecionados()"             p-icon="bi bi-trash"              p-kind="primary" style="margin-left: 5px;" p-tooltip="Excluir Selecionados"></po-button>
        <po-button p-label="RPW"                  (p-click)="onRPW()"             p-icon="bi bi-box-arrow-up-right" p-kind="primary" style="margin-left: 5px;" p-tooltip="Relatório via RPW"></po-button>
        <po-button p-label="Carga"                (p-click)="onCarga()"            p-icon="bi bi-upload"             p-danger="true"  style="margin-left: 5px;" p-tooltip="Cadastro via Carga"></po-button>
        
    </div>
    <div class="filtros-container">

      <form [formGroup]="form" class="campofiltros">
        <po-combo formControlName="codEstabel"

                  (p-change)="onEstabChange($event)" 
                  p-clean="true" 
                  [p-options]="listaEstabelecimentos"

                  p-label="Estabelecimento" 
                  p-icon="bi bi-pin-map" 
                  [p-placeholder]="placeHolderEstabelecimento">
          <ng-template p-combo-option-template let-option>
            <div class="po-row">
              <po-icon class="po-sm-2 po-md-3 po-lg-1" p-size="sm" p-icon="bi bi-pin-map"></po-icon>
              <div class="po-sm-10 po-md-9 po-lg-11">
                <div class="po-font-text-large-bold">{{ option.label }}</div>
                <div class="po-font-text-smaller">Filial: {{ option.codFilial }}</div>
              </div>
            </div>
          </ng-template>
        </po-combo>
        <po-combo p-label="Destino" 
                  formControlName="codEmit"
                  p-icon="bi bi-person-workspace" 
                  [p-options]="listaEmitente" 
                  
                  (p-change)="onEmitenteChange($event)"
                  
                  [p-placeholder]="placeHolderEmitente" 
                  p-clean="true"
                  [p-clean]="true">
          <ng-template p-combo-option-template let-option>
            <div class="po-row">
              <po-icon class="po-sm-2 po-md-3 po-lg-1" p-size="sm" p-icon="bi bi-person-workspace"></po-icon>
              <div class="po-sm-10 po-md-9 po-lg-11">
                <div class="po-font-text-large-bold">{{ option.label }}</div>
                <div class="po-font-text-smaller">Destino: {{ option.value }}</div>
              </div>
            </div>
          </ng-template>
        </po-combo>

        <po-combo class="combo-full"
                  p-label="Item" 
                  formControlName="codItem"
                  p-icon="bi bi-person-workspace" 
                  (p-change)="onItemChange($event)"
                  [p-placeholder]="placeHolderItem"
                  
                  p-dropdown-width="auto"

                  p-clean="true" 
                  [p-clean]="true" 
                  [p-options]="listaItens">
        </po-combo>
      </form>
    </div>
    
  </div>

  <div class="grid">

      <!--
      <p style="font-size: 15px; font-weight: bold; margin-bottom: -40px;">Total de Registros: {{this.total}}</p>
      -->
      <p style="font-size: 12px; display: flex; justify-content: flex-begins; margin-right: 260px; margin-bottom: -52px;">
        <btnDownload p-tooltip="Baixar Arquivo do RPW" [nomeArquivo]="arquivoTransbordo" [mostrarNomeArquivo]="false" style="height: 52px;"></btnDownload>
      </p>
      <p style="font-size: 15px; display: flex; justify-content: flex-end; margin-right: 260px; margin-bottom: -52px;">        
        <po-button  p-tooltip="Listagem em Excel"  p-icon="an an-microsoft-excel-logo"  p-label=""  (p-click)="onExcel()"          p-kind="primary"> </po-button>
        <po-button  p-tooltip="Pesquisa Avançada"  p-icon="bi bi-funnel"                p-label=""  (p-click)="onFiltroAvancado()" p-kind="primary"> </po-button>
      </p>
      <po-table #ttDados
                [p-items]="listaSelecaoFiltrada" 
                [p-columns]="colunas"
                
                [p-striped]="true" 
                p-sort="true"
                [p-sort]="true"
                [p-hide-table-search]="false" 
                [p-hide-columns-manager]="true" 
                p-container="true"
                [p-single-select]="false"
                [p-selectable]="true"
                [p-height]="alturaGrid"
                [p-literals]="customLiterals"
                [p-loading]="loadTela"
                (p-show-more)="loadMoreItens()"
                [p-show-more-disabled]="disableShowMore"
                >
                            
        <ng-template p-table-cell-template let-column="column" let-row="row">
          
            @if(column.property === 'opcao'){
                <div class="menuGrid">
                  <div>
                    
                    <span p-tooltip="Alterar" tooltip-position="top">
                      <button class="btn" (click)="onAlterar(row)">
                        <i class="bi bi-eraser-fill"></i>
                      </button>
                    </span>

                    <span p-tooltip="Excluir" tooltip-position="top">
                      <button class="btn" (click)="solicitarExclusao(row)">
                        <i class="bi bi-trash"></i>
                      </button>
                    </span>

                  </div>
                </div>
                
            }
        </ng-template>
        
      </po-table>
  </div>

  <!--MODAIS-->
  <po-modal #ChamaCadastro p-size="auto" p-title="Cadastro de Transbordo [ {{ objSolic }} ]"  >

      <po-divider p-label="Dados:"></po-divider>
      
          <po-widget>
              <po-combo 
                        [ngModel]="registroSelecionado.codEstabel"
                        (p-change)="registroSelecionado.codEstabel = $event"
                        name="codEstabel" 
                        [p-disabled]="modoAlteracao" 
                        
                        [p-options]="listaEstabelecimentos" 
                        p-icon="po-icon-manufacture"
                        p-label="Estabelecimento"  
                        p-placeholder="Selecione um Estabelecimento">
                  <ng-template p-combo-option-template let-option>
                      <div class="po-row">
          
                          <span class="po-icon po-icon-manufacture po-sm-2 po-md-3 po-lg-1"> </span>
                          <div class="po-sm-10 po-md-9 po-lg-11">
                              <div class="po-font-text-large-bold">{{ option.label }}</div>
                              <div class="po-font-text-smaller">Filial: {{ option.value }}</div>
                          </div>
                      </div>
                  </ng-template>
              </po-combo>

              <po-combo [ngModel]="registroSelecionado.codEmitente"
                        (p-change)="registroSelecionado.codEmitente = $event"
                        [p-disabled]="modoAlteracao" 
                        name="codEmitente" 
                        [p-options]="listaEmitente" 
                        p-icon="po-icon-manufacture"
                        p-label="Destino" p-placeholder="Selecione um Destino">
                  <ng-template p-combo-option-template let-option>
                      <div class="po-row">
          
                          <span class="po-icon po-icon-manufacture po-sm-2 po-md-3 po-lg-1"> </span>
                          <div class="po-sm-10 po-md-9 po-lg-11">
                              <div class="po-font-text-large-bold">{{ option.label }}</div>
                              <div class="po-font-text-smaller">Destino: {{ option.value }}</div>
                          </div>
                      </div>
                  </ng-template>
              </po-combo>
  
              <div class="item-row">

                <po-input [(ngModel)]="registroSelecionado.codItem" 
                          name="codItem"
                          p-disabled="{{ modoAlteracao }}"
                          class="item-codigo"
                          p-label="Item"
                          p-required 
                          p-mask="99.999.99999-9@" 
                          p-mask-format-model="true"
                          (p-blur)="ChamaDescItem()">
                </po-input>

                <po-button
                  class="item-search"
                  p-icon="bi bi-search"
                  p-kind="tertiary"
                  p-tooltip="Pesquisar item"
                  (p-click)="ChamaDescItem()">
                </po-button>

                <po-input [ngModel]="registroSelecionado.descItem"
                          (p-change)="registroSelecionado.descItem = $event"
                          name="descItem"
                          class="item-descricao"
                          p-label="Descrição"
                          
                          p-readonly>
                </po-input>

              </div>
          </po-widget>
          <po-widget>
              <div class="item-row switch-row">

                <po-datepicker [(ngModel)]="registroSelecionado.dtValidade" 
                               name="dtValidade"
                               p-label="Data de Validade"> </po-datepicker>
                <po-switch [ngModel]="registroSelecionado.lAtivo" 
                          name="lAtivo" 
                          (p-change)="registroSelecionado.lAtivo = $event" 
                          p-label="Ativo" 
                          p-label-off="Nao" 
                          p-label-on="Sim"> </po-switch>

              </div>
                
          </po-widget>

      <po-modal-footer [p-disabled-align]="false">
          <po-button p-label="true" p-label="Cancelar" (p-click)="FecharChamaCadastro()"> </po-button>
          <po-button p-kind="primary" p-label="Confirmar" (p-click)="onConfirmar()"> </po-button>
      </po-modal-footer>

  </po-modal>

  <po-modal #telaFiltroAvancado p-title="Filtro Avançado"
                                p-size="md" 
                                p-click-out="false" 
                                [p-hide-close]="true"
                                [p-primary-action]="acaoConfirmarFiltro" 
                                [p-secondary-action]="acaoCancelarFiltro">
      
      <form [formGroup]="form">
        
          <div class="filtroAvancado">
         
            <dn-range [cLabel]="filtro.cLabelCodEstabel"  [(cini)]="filtro.valEstabIni"   [(cfim)]="filtro.valEstabFim"   type="text"   cmask="AAA"></dn-range>
            <dn-range [cLabel]="filtro.cLabelCodEmit"     [(cini)]="filtro.valEmitIni"    [(cfim)]="filtro.valEmitFim"    type="number" cmask="000000000"></dn-range>
            <dn-range [cLabel]="filtro.cLabelItem"        [(cini)]="filtro.valItemIni"    [(cfim)]="filtro.valItemFim"    type="text"   cmask="AA.AAA.AAAAA-AA"></dn-range>
            
          </div>        

      </form>
    
      <div class="limpar">
        <po-button p-tooltip="Limpar Filtros"  p-icon="bi bi-eraser-fill" p-label="Limpar filtros" (p-click)="limparFiltros()" [p-disabled]="!filtrosAlterados"> </po-button>
      </div>
  </po-modal>

  <po-modal #telaRPW p-title="Gerar relatório via RPW1"
                                p-size="md" 
                                p-click-out="false" 
                                [p-hide-close]="true"
                                [p-primary-action]="acaoConfirmarRPW" 
                                [p-secondary-action]="acaoCancelarRPW">
      
      <form [formGroup]="form">
        
          <div class="filtroAvancado">
         
            <dn-range [cLabel]="filtro.cLabelCodEstabel"  [(cini)]="filtro.valEstabIni"   [(cfim)]="filtro.valEstabFim"   type="text"   cmask="AAA"></dn-range>
            <dn-range [cLabel]="filtro.cLabelCodEmit"     [(cini)]="filtro.valEmitIni"    [(cfim)]="filtro.valEmitFim"    type="number" cmask="000000000"></dn-range>
            <dn-range [cLabel]="filtro.cLabelItem"        [(cini)]="filtro.valItemIni"    [(cfim)]="filtro.valItemFim"    type="text"   cmask="AA.AAA.AAAAA-AA"></dn-range>
            
          </div>        

      </form>
    
      <div class="limpar">
        <po-button p-tooltip="Limpar Filtros"  p-icon="bi bi-eraser-fill" p-label="Limpar filtros" (p-click)="limparFiltros()" [p-disabled]="!filtrosAlterados"> </po-button>
      </div>
  </po-modal>

    <rpw-acomp [numPedExec]="numPedExec()" 
               [intervalo]="5000" 
               [tentativas]="50">
    </rpw-acomp>

    <po-modal #abrirArquivo [p-title]="nomeArquivo" p-size="auto" p-click-out="false" [p-primary-action]="acaoSair"
                            [p-secondary-action]="acaoImprimir">
  
        <div innerHtml={{this.conteudoArquivo}} class="formatoTexto"></div>
  
    </po-modal>
    
    <po-modal #pdfModal p-title="Visualizar Documento" p-primary-action-label="Fechar">
      <iframe *ngIf="pdfUrl" [src]="pdfUrl" width="100%" height="900px" style="border: none;"></iframe>
    </po-modal>
